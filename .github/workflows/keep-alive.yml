name: Keep Alive Workflow

on:
  schedule:
    # 매달 1일 00:00 (UTC)에 실행
    - cron: '0 0 1 * *'
  # 필요할 때 수동으로도 실행할 수 있도록 설정
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create empty commit
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git commit --allow-empty -m "chore: keep actions alive [skip ci]"
        git push
